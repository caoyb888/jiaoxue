server:
  port: 8089

spring:
  application:
    name: edu-file
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:100.84.68.115:18848}
        namespace: ${NACOS_NAMESPACE:dev}
      config:
        server-addr: ${NACOS_ADDR:100.84.68.115:18848}
        namespace: ${NACOS_NAMESPACE:dev}
        file-extension: yaml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:100.84.68.115}:${MYSQL_PORT:13306}/edu_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:edu_dev_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:100.84.68.115}
      port: ${REDIS_PORT:16379}
      database: 4

file:
  lifecycle:
    # 直播回放转冷存储天数 / 考试附件删除天数（S8-06）
    replay-cold-days: ${FILE_REPLAY_COLD_DAYS:60}
    exam-attach-delete-days: ${FILE_EXAM_ATTACH_DELETE_DAYS:90}

xxl:
  job:
    admin:
      addresses: ${XXL_JOB_ADMIN:http://100.84.68.115:18160/xxl-job-admin}
    access-token: ${XXL_JOB_TOKEN:edu-xxljob-token-2026}
    executor:
      appname: edu-file
      address:
      ip: ${XXL_JOB_EXECUTOR_IP:}
      port: ${XXL_JOB_EXECUTOR_PORT:9986}
      logpath: ${XXL_JOB_LOGPATH:/tmp/edu-xxl-job/jobhandler}
      logretentiondays: 7

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

minio:
  endpoint: ${MINIO_ENDPOINT:http://100.84.68.115:19000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  buckets:
    - edu-slides
    - edu-videos
    - edu-exam-attach
    - edu-live-replay
    - edu-archive-photo
  default-bucket: edu-slides
  presign-expire-minutes: 60

logging:
  level:
    cn.smu.edu: INFO
