server:
  port: 18080

spring:
  application:
    name: edu-gateway
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:100.84.68.115:18848}
        namespace: ${NACOS_NAMESPACE:dev}
      config:
        server-addr: ${NACOS_ADDR:100.84.68.115:18848}
        namespace: ${NACOS_NAMESPACE:dev}
        file-extension: yaml
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: edu-auth
          uri: lb://edu-auth
          predicates:
            - Path=/api/v1/auth/**
        - id: edu-user
          uri: lb://edu-user
          predicates:
            - Path=/api/v1/users/**,/api/v1/depts/**,/api/v1/roles/**
        - id: edu-course
          uri: lb://edu-course
          predicates:
            - Path=/api/v1/course/**,/api/v1/lesson/**,/api/v1/material/**
        - id: edu-interaction
          uri: lb://edu-interaction
          predicates:
            - Path=/api/v1/interaction/**,/api/v1/attend/**,/api/v1/barrage/**
        # 一键AI出题在 edu-ai，需先于 edu-exam 的 /question/** 匹配
        - id: edu-ai-question
          uri: lb://edu-ai
          predicates:
            - Path=/api/v1/question/ai-generate/**
        - id: edu-exam
          uri: lb://edu-exam
          predicates:
            - Path=/api/v1/exam/**,/api/v1/question/**
        - id: edu-grade
          uri: lb://edu-grade
          predicates:
            - Path=/api/v1/grade/**
        # AI对话 SSE 流式：关闭响应超时，避免长连接被网关切断（不缓冲、逐块透传）
        - id: edu-ai-dialogue
          uri: lb://edu-ai
          predicates:
            - Path=/api/v1/ai/dialogue/**
          metadata:
            response-timeout: -1
          filters:
            - RemoveRequestHeader=Content-Length
        - id: edu-ai
          uri: lb://edu-ai
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - RemoveRequestHeader=Content-Length
        - id: edu-stat
          uri: lb://edu-stat
          predicates:
            - Path=/api/v1/stat/**
        - id: edu-file
          uri: lb://edu-file
          predicates:
            - Path=/api/v1/file/**
        - id: edu-notify-ws
          uri: lb://edu-notify
          predicates:
            - Path=/ws/**
        - id: edu-admin
          uri: lb://edu-admin
          predicates:
            - Path=/api/v1/admin/**
        - id: edu-jwxt
          uri: lb://edu-jwxt
          predicates:
            - Path=/api/v1/jwxt/**
  webflux:
    codec:
      max-in-memory-size: 10MB

