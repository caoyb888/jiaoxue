server:
  port: 8093

spring:
  application:
    name: edu-jwxt
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:100.84.68.115:18848}
        namespace: ${NACOS_NAMESPACE:dev}
      config:
        server-addr: ${NACOS_ADDR:100.84.68.115:18848}
        namespace: ${NACOS_NAMESPACE:dev}
        file-extension: yaml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:100.84.68.115}:${MYSQL_PORT:13306}/edu_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:edu_dev_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:100.84.68.115}
      port: ${REDIS_PORT:16379}
      database: 7

jwxt:
  # 当前生效的教务厂商适配器：zhengfang / qiangzhi / stub（dev 默认 stub）
  vendor: ${JWXT_VENDOR:stub}
  sync:
    batch-size: ${JWXT_SYNC_BATCH:500}
  zhengfang:
    base-url: ${JWXT_ZHENGFANG_URL:}
  qiangzhi:
    base-url: ${JWXT_QIANGZHI_URL:}

xxl:
  job:
    admin:
      addresses: ${XXL_JOB_ADMIN:http://100.84.68.115:18160/xxl-job-admin}
    access-token: ${XXL_JOB_TOKEN:edu-xxljob-token-2026}
    executor:
      appname: edu-jwxt
      address:
      ip: ${XXL_JOB_EXECUTOR_IP:}
      port: ${XXL_JOB_EXECUTOR_PORT:9989}
      logpath: ${XXL_JOB_LOGPATH:/tmp/edu-xxl-job/jobhandler}
      logretentiondays: 7

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    cn.smu.edu: INFO
    cn.smu.edu.jwxt.repository: DEBUG
