server:
  port: 8090

spring:
  application:
    name: edu-notify
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:100.84.68.115:18848}
        namespace: ${NACOS_NAMESPACE:dev}
      config:
        server-addr: ${NACOS_ADDR:100.84.68.115:18848}
        namespace: ${NACOS_NAMESPACE:dev}
        file-extension: yaml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:100.84.68.115}:${MYSQL_PORT:13306}/edu_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:edu_dev_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:100.84.68.115}
      port: ${REDIS_PORT:16379}
      database: 3
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:100.84.68.115:19092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: "1"
      retries: 3
    consumer:
      group-id: notify-teaching
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # 用生产端写入的 __TypeId__ 头反序列化为 TeachingEvent（edu-common），信任全部包
        spring.json.trusted.packages: "*"

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

notify:
  wechat:
    # dev/CI 为 mock：仅记录日志不真发微信订阅消息；生产由 OPS 接入微信模板 API
    mock-mode: ${WECHAT_MOCK_MODE:true}

logging:
  level:
    cn.smu.edu: INFO
