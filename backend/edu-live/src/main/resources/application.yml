server:
  port: 8091

spring:
  application:
    name: edu-live
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:100.84.68.115:18848}
        namespace: ${NACOS_NAMESPACE:dev}
      config:
        server-addr: ${NACOS_ADDR:100.84.68.115:18848}
        namespace: ${NACOS_NAMESPACE:dev}
        file-extension: yaml
  datasource:
    url: jdbc:mysql://${DB_HOST:100.84.68.115}:${DB_PORT:13306}/edu_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASS:edu_dev_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 3
      maximum-pool-size: 10
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:100.84.68.115}
      port: ${REDIS_PORT:16379}
      database: 0
  kafka:
    bootstrap-servers: ${KAFKA_ADDR:100.84.68.115:19092}
    consumer:
      group-id: edu-live
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

redisson:
  address: redis://${REDIS_HOST:100.84.68.115}:${REDIS_PORT:16379}
  database: 4

live:
  # SRS 流媒体地址（S8-02 集成 SRS）；仅 ONLINE_CLASS 模式下发
  rtmp-base: ${LIVE_RTMP_BASE:rtmp://100.84.68.115:1935/live}
  hls-base: ${LIVE_HLS_BASE:http://100.84.68.115:8080/live}
  # 直播回放 MinIO 桶（S8-02 DVR 上传；S8-07 配生命周期 60 天转冷存储）
  replay-bucket: ${LIVE_REPLAY_BUCKET:live-replay}

minio:
  endpoint: ${MINIO_ENDPOINT:http://100.84.68.115:19000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    cn.smu.edu: INFO
