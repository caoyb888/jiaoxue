server:
  port: 8085

spring:
  application:
    name: edu-exam
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:100.84.68.115:18848}
        namespace: ${NACOS_NAMESPACE:dev}
      config:
        server-addr: ${NACOS_ADDR:100.84.68.115:18848}
        namespace: ${NACOS_NAMESPACE:dev}
        file-extension: yaml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:100.84.68.115}:${MYSQL_PORT:13306}/edu_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:edu_dev_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:100.84.68.115}
      port: ${REDIS_PORT:16379}
      database: 3
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:100.84.68.115:19092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: "1"
      retries: 3
    consumer:
      group-id: edu-exam
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "cn.smu.edu.exam.event,cn.smu.edu.common.event"

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

redisson:
  address: redis://${REDIS_HOST:100.84.68.115}:${REDIS_PORT:16379}
  database: 3

logging:
  level:
    cn.smu.edu: INFO
    cn.smu.edu.exam.repository: DEBUG
