version: '3.9'

# 山东管理学院智慧教学系统 — 内网机开发中间件
# 运行机器：100.84.68.115 (onlyserver)
# 端口规则：所有端口在标准端口前加 1 前缀，规避 Nextcloud 占用的 3306/6379/8080/8088
#   MySQL    3306  → 13306
#   Redis    6379  → 16379
#   Kafka    9092  → 19092
#   Nacos    8848  → 18848
#   MongoDB  27017 → 17017
#   MinIO    9000  → 19000
#   ES       9200  → 19200
#   ClickHouse 8123 → 18123
#   XXL-Job  8160  → 18160

networks:
  edu-net:
    driver: bridge

volumes:
  edu-mysql-data:
  edu-redis-data:
  edu-kafka-data:
  edu-nacos-data:
  edu-mongo-data:
  edu-minio-data:
  edu-es-data:
  edu-clickhouse-data:
  edu-xxljob-data:

services:

  # ─── MySQL 8.0 ───────────────────────────────────────────────────────────────
  # 8.0.32 是最后一个使用 Ubuntu Focal (glibc 2.31) 的镜像，兼容旧 CPU（无 popcnt 指令）
  edu-mysql:
    image: mysql:8.0.32
    container_name: edu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: edu_dev_2026
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "13306:3306"
    volumes:
      - edu-mysql-data:/var/lib/mysql
      - ./init/mysql:/docker-entrypoint-initdb.d
    command:
      - --default-authentication-plugin=mysql_native_password
      - --lower_case_table_names=1
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
      - --innodb_buffer_pool_size=512M
    networks:
      - edu-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pedu_dev_2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ─────────────────────────────────────────────────────────────────
  edu-redis:
    image: redis:7.2-alpine
    container_name: edu-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - edu-redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - edu-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Zookeeper（Kafka 依赖）────────────────────────────────────────────────
  # 7.0.x 使用 Ubuntu Focal 基础镜像，兼容无 popcnt 的旧 CPU
  edu-zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: edu-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - edu-net

  # ─── Kafka 3.6 ───────────────────────────────────────────────────────────────
  edu-kafka:
    image: confluentinc/cp-kafka:7.0.1
    container_name: edu-kafka
    restart: on-failure
    depends_on:
      - edu-zookeeper
    ports:
      - "19092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: edu-zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://100.84.68.115:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    volumes:
      - edu-kafka-data:/var/lib/kafka/data
    networks:
      - edu-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Nacos 2.3 ───────────────────────────────────────────────────────────────
  # 开发环境使用嵌入式 Derby 模式，无需初始化 MySQL Nacos schema
  # 生产环境切换为 MySQL 持久化（需提前导入 nacos-mysql.sql）
  edu-nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: edu-nacos
    restart: unless-stopped
    ports:
      - "18848:8848"
      - "19848:9848"
      - "19849:9849"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ''
      NACOS_AUTH_ENABLE: 'false'
      JVM_XMS: 256m
      JVM_XMX: 512m
      PREFER_HOST_MODE: hostname
    volumes:
      - edu-nacos-data:/home/nacos/data
    networks:
      - edu-net

  # ─── MongoDB 4.4 ─────────────────────────────────────────────────────────────
  # MongoDB 5.0+ 需要 AVX 指令集，4.4 不需要，兼容 Core 2 Duo 等旧 CPU
  edu-mongo:
    image: mongo:4.4
    container_name: edu-mongo
    restart: unless-stopped
    ports:
      - "17017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: edu_dev_2026
      MONGO_INITDB_DATABASE: edu_ai_db
    volumes:
      - edu-mongo-data:/data/db
    networks:
      - edu-net
    healthcheck:
      # mongo 4.4 使用 mongo shell（非 mongosh）
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/edu_ai_db --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO ───────────────────────────────────────────────────────────────────
  # 2024 版本的 minio 二进制依赖 x86-64-v2，使用 2022 年版本规避旧 CPU 兼容问题
  edu-minio:
    image: minio/minio:RELEASE.2022-11-26T22-43-32Z
    container_name: edu-minio
    restart: unless-stopped
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - edu-minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - edu-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Elasticsearch 8.11 ──────────────────────────────────────────────────────
  edu-elasticsearch:
    image: elasticsearch:8.11.4
    container_name: edu-elasticsearch
    restart: unless-stopped
    ports:
      - "19200:9200"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    volumes:
      - edu-es-data:/usr/share/elasticsearch/data
    networks:
      - edu-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── ClickHouse 22.8 LTS ─────────────────────────────────────────────────────
  # 22.8 LTS 使用 Ubuntu Focal，23.x 使用 Jammy 需要 x86-64-v2
  edu-clickhouse:
    image: clickhouse/clickhouse-server:22.8
    container_name: edu-clickhouse
    restart: unless-stopped
    ports:
      - "18123:8123"
      - "19900:9000"
    environment:
      CLICKHOUSE_DB: edu_stat_db
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: edu_dev_2026
    volumes:
      - edu-clickhouse-data:/var/lib/clickhouse
    networks:
      - edu-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── XXL-Job 2.4 ─────────────────────────────────────────────────────────────
  edu-xxljob:
    image: xuxueli/xxl-job-admin:2.4.1
    container_name: edu-xxljob
    restart: unless-stopped
    depends_on:
      edu-mysql:
        condition: service_healthy
    ports:
      - "18160:8080"
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://edu-mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=root
        --spring.datasource.password=edu_dev_2026
        --xxl.job.accessToken=edu-xxljob-token-2026
    volumes:
      - edu-xxljob-data:/data/applogs
    networks:
      - edu-net
