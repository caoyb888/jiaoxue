name: Backend CI

on:
  push:
    branches: [develop, main, 'release/**']
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [develop, main]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Maven settings (Aliyun mirror)
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <mirrors>
              <mirror>
                <id>aliyun</id>
                <mirrorOf>*</mirrorOf>
                <url>https://maven.aliyun.com/repository/public</url>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Build edu-common
        run: mvn install -pl edu-common -am -q -DskipTests
        working-directory: backend

      - name: Run unit tests (modules with tests only)
        run: |
          mvn test -pl edu-exam,edu-grade,edu-interaction,edu-course,edu-ai \
            -am --fail-at-end -q
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Build all modules
        run: mvn package -DskipTests -q --fail-at-end
        working-directory: backend

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/develop'
        with:
          name: backend-jars
          path: backend/*/target/*.jar
          retention-days: 7

  deploy-dev:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: development

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-jars
          path: artifacts/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Deploy to internal server
        run: |
          # 传输并重启变更的服务
          for jar in artifacts/*/target/*.jar; do
            svc=$(basename $(dirname $jar) | sed 's/-[0-9].*//')
            scp $jar ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/smart-edu/apps/${svc}.jar
            ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "systemctl restart edu-${svc} 2>/dev/null || \
               (nohup java -jar ~/smart-edu/apps/${svc}.jar \
                 --spring.profiles.active=dev > ~/smart-edu/logs/${svc}.log 2>&1 &)"
            echo "已部署: $svc"
          done
