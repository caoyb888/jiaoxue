name: Frontend CI

on:
  push:
    branches: [develop, main, 'release/**']
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [develop, main]
    paths:
      - 'frontend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: TypeScript type check
        run: pnpm typecheck
        working-directory: frontend

      - name: ESLint (含 no-dom-in-weapp 规则)
        run: pnpm lint
        working-directory: frontend

      - name: Run unit tests
        run: pnpm test
        working-directory: frontend

      - name: Build web app
        run: pnpm --filter web build
        working-directory: frontend
        env:
          VITE_API_BASE: http://100.84.68.115:18080

  deploy-dev:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install & Build
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter web build
        working-directory: frontend
        env:
          VITE_API_BASE: http://100.84.68.115:18080

      - name: Deploy to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts
          rsync -avz --delete frontend/apps/web/dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/smart-edu/web/
          echo "前端部署完成"
